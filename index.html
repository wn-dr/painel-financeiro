<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Pessoais - Wander Tech+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                } 
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="text-slate-800 dark:text-slate-200 font-sans antialiased p-4 md:p-8">

<!-- Container de Autenticação -->
<div id="auth-container" class="auth-container">
    <div class="glass p-8 rounded-[3rem] border-white/60 auth-card space-y-6">
        <div class="text-center space-y-2">
            <h2 id="auth-title" class="text-3xl font-extrabold text-slate-900 dark:text-white uppercase tracking-tight">Login</h2>
            <p id="auth-subtitle" class="text-[10px] font-mono font-bold text-indigo-500/60 uppercase tracking-widest">Acesse sua conta Wander Tech+</p>
        </div>

        <form id="auth-form" onsubmit="handleAuthSubmit(event)" class="space-y-4">
            <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">E-mail</label>
                <input id="auth-email" type="email" placeholder="seu@email.com" required class="w-full bg-white/50 dark:bg-slate-900/40 p-4 rounded-2xl text-sm outline-none border border-transparent focus:border-indigo-500 font-bold placeholder:opacity-30">
            </div>

            <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Senha</label>
                <input id="auth-password" type="password" placeholder="••••••••" required class="w-full bg-white/50 dark:bg-slate-900/40 p-4 rounded-2xl text-sm outline-none border border-transparent focus:border-indigo-500 font-bold placeholder:opacity-30">
            </div>

            <div id="auth-message" class="text-xs text-red-500 font-bold text-center hidden"></div>

            <button type="submit" id="auth-btn" class="btn-press w-full bg-slate-900 dark:bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl transition-all text-xs uppercase tracking-widest mt-2">
                Entrar
            </button>
        </form>

        <div class="text-center pt-2">
            <button onclick="toggleAuthMode()" id="auth-toggle-link" class="text-[9px] font-black text-indigo-500 hover:text-indigo-600 uppercase tracking-widest transition-all">
                Não tem uma conta? Cadastre-se
            </button>
        </div>
    </div>
</div>

<!-- Container Principal da Aplicação (Oculto até autenticar) -->
<div id="app-container" class="max-w-[1500px] mx-auto auth-hidden">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div>
            <h1 class="text-4xl font-extrabold text-slate-900 dark:text-white tracking-tighter uppercase">
                Finanças <span class="text-indigo-600 dark:text-indigo-500">Pessoais</span>
            </h1>
            <p class="text-[11px] font-mono font-bold text-indigo-500/60 tracking-[0.4em] uppercase mt-1">Wander Tech+</p>
        </div>
        <div class="flex flex-wrap items-center gap-3 justify-center">
            <span id="user-email-display" class="text-[10px] font-mono font-bold uppercase opacity-60 mr-2 bg-indigo-500/10 text-indigo-600 px-3 py-1.5 rounded-xl border border-indigo-500/5"></span>
            <button onclick="exportarExcel()" class="btn-press bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] font-black px-6 py-3.5 rounded-2xl transition-all shadow-lg shadow-emerald-500/20 uppercase">Exportar Filtrados</button>
            <button onclick="resetarGeral()" class="btn-press glass p-3.5 rounded-2xl text-red-500 hover:bg-red-500/10" title="Reset Total"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
            <button onclick="toggleDarkMode()" class="btn-press glass p-3.5 rounded-2xl text-amber-500"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9 9 0 0021.027 16.779c.142-.12.33-.314.327-.425z" /></svg></button>
            <button onclick="handleLogout()" class="btn-press bg-red-500/10 hover:bg-red-500/20 text-red-500 text-[10px] font-black px-5 py-3.5 rounded-2xl transition-all uppercase tracking-widest">Sair</button>
        </div>
    </header>

    <div class="grid lg:grid-cols-12 gap-10 items-start">
        
        <aside class="lg:col-span-4 sticky-panel">
            <div class="glass p-8 rounded-[3rem] border-white/60 custom-scroll">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-2">
                        <div class="h-1.5 w-8 bg-indigo-600 rounded-full"></div>
                        <h3 class="text-[12px] font-black uppercase text-slate-400 tracking-[0.2em]">Novo Lançamento</h3>
                    </div>
                    <button onclick="limparCamposLancamento(true)" class="text-[9px] font-black text-slate-400 hover:text-indigo-500 uppercase tracking-widest transition-all">Limpar Painel</button>
                </div>
                
                <div class="space-y-5">
                    <input type="hidden" id="editandoId" value="">
                    <input type="hidden" id="grupoId" value="">
                    
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Descrição</label>
                        <input id="descricao" type="text" placeholder="EX: REPARO NOTEBOOK" class="w-full bg-white/50 dark:bg-slate-900/40 p-4 rounded-2xl text-sm outline-none border border-transparent focus:border-indigo-500 font-bold placeholder:opacity-30">
                    </div>
                    
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Valor do Gasto</label>
                        <input id="valor" placeholder="R$ 0,00" class="w-full bg-indigo-600/5 dark:bg-indigo-500/10 p-5 rounded-2xl font-black text-indigo-600 dark:text-indigo-400 text-2xl font-mono outline-none border border-transparent focus:border-indigo-500 transition-all">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <select id="mes_cal" class="filter-input w-full"></select>
                        <select id="ano_cal" class="filter-input w-full"></select>
                    </div>

                    <div class="space-y-2">
                        <input id="responsavel" type="text" placeholder="RESPONSÁVEL" class="filter-input w-full" autocomplete="off" onfocus="mostrarSugestoes()" oninput="mostrarSugestoes()">
                        <div id="sugestoesResponsavel" class="flex flex-wrap gap-2 px-2"></div>
                    </div>

                    <select id="cartao" class="filter-input w-full"></select>
                    <select id="categoria" class="filter-input w-full"></select>
                    
                    <div class="p-5 rounded-3xl bg-indigo-600/5 dark:bg-white/5 border border-indigo-500/10 space-y-4">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="mensal" class="w-5 h-5 rounded-lg border-none bg-indigo-200 text-indigo-600 focus:ring-0">
                            <span class="text-[11px] font-black text-slate-500 uppercase group-hover:text-indigo-500 transition-colors">Gasto Mensal Fixo</span>
                        </label>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <span class="text-[8px] font-black text-slate-400 ml-1 uppercase">Parcela Atual</span>
                                <select id="parcelaAtual" class="w-full bg-white/40 dark:bg-slate-900/40 p-3 rounded-xl text-[10px] font-bold"></select>
                            </div>
                            <div class="space-y-1">
                                <span class="text-[8px] font-black text-slate-400 ml-1 uppercase">Total de Parcelas</span>
                                <select id="parcelasTotal" class="w-full bg-white/40 dark:bg-slate-900/40 p-3 rounded-xl text-[10px] font-bold"></select>
                            </div>
                        </div>
                    </div>

                    <button onclick="adicionar()" class="btn-press w-full bg-slate-900 dark:bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-[2rem] shadow-xl transition-all text-[11px] uppercase tracking-widest mt-4">Confirmar e Salvar</button>
                </div>
            </div>
        </aside>

        <main class="lg:col-span-8 space-y-8">
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="glass p-6 rounded-[2.5rem]">
                    <p class="text-[10px] font-black text-indigo-500 uppercase mb-2 tracking-widest">Total Filtrado</p>
                    <h2 id="totalFiltrado" class="text-2xl font-mono font-bold tracking-tighter">R$ 0,00</h2>
                </div>
                <div class="glass p-6 rounded-[2.5rem]">
                    <p class="text-[10px] font-black text-emerald-500 uppercase mb-2 tracking-widest">Gastos Fixos</p>
                    <h2 id="totalFixos" class="text-2xl font-mono font-bold tracking-tighter text-slate-400">R$ 0,00</h2>
                </div>
                
                <div class="glass p-6 rounded-[2.5rem] flex flex-col items-center justify-center relative min-h-[160px]">
                    <p class="absolute top-4 text-[9px] font-black uppercase text-slate-400">Por Cartão</p>
                    <div class="flex items-center w-full gap-4 mt-6">
                        <div class="w-1/2 h-20"><canvas id="graficoCartao"></canvas></div>
                        <div id="legendaCartao" class="w-1/2 text-[9px] font-bold space-y-1 overflow-y-auto max-h-24 custom-scroll"></div>
                    </div>
                </div>

                <div class="glass p-6 rounded-[2.5rem] flex flex-col items-center justify-center relative min-h-[160px]">
                    <p class="absolute top-4 text-[9px] font-black uppercase text-slate-400">Por Categoria</p>
                    <div class="w-full h-20 mt-6"><canvas id="graficoCategoria"></canvas></div>
                </div>
            </div>

            <section class="glass rounded-[3rem] p-8 border-indigo-500/10">
                <div class="flex items-center justify-between mb-6">
                    <p class="text-[10px] font-black text-indigo-500/60 uppercase tracking-[0.3em]">Filtros Inteligentes</p>
                    <button onclick="limparFiltros()" class="text-[9px] font-black text-slate-400 hover:text-red-500 uppercase tracking-widest transition-colors opacity-50 hover:opacity-100">Limpar Filtros</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <input type="text" id="f_busca" oninput="render()" placeholder="O QUE PROCURA?" class="filter-input w-full">
                    <select id="f_responsavel" onchange="render()" class="filter-input w-full"></select>
                    <select id="f_categoria" onchange="render()" class="filter-input w-full"></select>
                    
                    <select id="f_cartao" onchange="render()" class="filter-input w-full"></select>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="f_mes" onchange="render()" class="filter-input w-full"></select>
                        <select id="f_ano" onchange="render()" class="filter-input w-full"></select>
                    </div>
                    <button onclick="enviarWhatsAppResponsavel()" class="btn-press bg-green-600 hover:bg-green-500 text-white rounded-[1.2rem] text-[11px] font-black uppercase shadow-lg shadow-green-500/20 py-3">
                        WhatsApp
                    </button>
                </div>
            </section>

            <div class="glass rounded-[3rem] overflow-hidden mb-12">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-indigo-500/5 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-white/10">
                            <tr>
                                <th class="py-6 px-8 text-left">Data</th>
                                <th class="py-6 px-8 text-left">Método</th>
                                <th class="py-6 px-8 text-left">Lançamento</th>
                                <th class="py-6 px-8 text-right">Valor</th>
                            </tr>
                        </thead>
                        <tbody id="tabela" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
