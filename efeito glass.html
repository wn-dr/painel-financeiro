<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Glass iOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: radial-gradient(circle at top left, #e2e8f0, #f8fafc);
            background-attachment: fixed;
            transition: background 0.5s ease;
        }
        .dark body {
            background: radial-gradient(circle at top left, #0f172a, #020617);
        }

        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
        
        select, input { outline: none !important; }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-200 min-h-screen font-sans antialiased">

<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-400/20 blur-[120px] rounded-full z-[-1]"></div>
<div class="fixed bottom-[10%] right-[-5%] w-[30%] h-[30%] bg-blue-400/20 blur-[100px] rounded-full z-[-1]"></div>

<div class="max-w-7xl mx-auto p-4 md:p-8 relative">
    
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 pb-8 border-b border-white/20 dark:border-slate-800 text-center md:text-left">
        <div class="flex flex-col md:flex-row items-center gap-8">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 dark:text-white tracking-tight uppercase italic drop-shadow-sm">
                    Finanças <span class="text-indigo-600 dark:text-indigo-400">Pessoais</span>
                </h1>
                <p class="text-[13px] font-mono font-bold text-slate-500 dark:text-slate-400 mt-2 tracking-[0.25em] uppercase opacity-90">
                    Config <span class="text-indigo-500">wn-dr</span>
                </p>
            </div>
            
            <div class="flex gap-4 items-center glass px-6 py-3 rounded-2xl border-white/40 shadow-sm">
                <a href="https://github.com" target="_blank" class="transition-all duration-300 hover:scale-110 active:scale-90 text-slate-900 dark:text-white opacity-60 hover:opacity-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>
                </a>
                <a href="https://instagram.com" target="_blank" class="transition-all duration-300 hover:scale-110 active:scale-90 text-pink-600 dark:text-pink-400 opacity-60 hover:opacity-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line></svg>
                </a>
                <a href="https://linkedin.com" target="_blank" class="transition-all duration-300 hover:scale-110 active:scale-90 text-blue-600 dark:text-blue-400 opacity-60 hover:opacity-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect width="4" height="12" x="2" y="9"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                </a>
            </div>
        </div>

        <div class="flex flex-wrap justify-center items-center gap-3">
            <button onclick="exportarExcel()" class="flex items-center gap-2 text-[10px] font-bold bg-emerald-600/80 hover:bg-emerald-600 text-white px-5 py-3 rounded-2xl transition-all shadow-lg uppercase tracking-wider">
                Excel
            </button>
            <button onclick="toggleDarkMode()" class="glass p-3 rounded-2xl text-slate-600 dark:text-amber-400 hover:scale-105 transition-all shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9 9 0 0021.027 16.779c.142-.12.33-.314.327-.425z" /></svg>
            </button>
            <button onclick="resetar()" class="text-[10px] font-semibold text-red-500 bg-red-500/10 hover:bg-red-500/20 px-4 py-3 rounded-2xl transition-all border border-red-500/10 uppercase">Resetar</button>
        </div>
    </header>

    <div class="grid lg:grid-cols-4 gap-8">
        <div class="lg:col-span-1">
            <div class="glass p-6 rounded-[2.5rem] shadow-xl sticky top-4">
                <h3 class="text-sm font-bold mb-6 flex items-center gap-2 text-slate-900 dark:text-white uppercase tracking-wider">
                    <span class="w-2 h-4 bg-indigo-500 rounded-full"></span> Novo Registro
                </h3>
                <div class="space-y-4">
                    <input id="descricao" type="text" placeholder="Descrição" class="w-full bg-white/50 dark:bg-slate-800/50 border-white/30 dark:border-slate-700 border p-3 rounded-2xl transition-all text-xs" />
                    
                    <div class="grid grid-cols-2 gap-3">
                        <input id="valor" placeholder="R$ 0,00" class="w-full bg-white/50 dark:bg-slate-800/50 border-white/30 dark:border-slate-700 border p-3 rounded-2xl font-bold text-indigo-600 dark:text-indigo-400 text-xs font-mono" />
                        <div class="flex gap-1">
                            <select id="mes_cal" class="w-full bg-white/50 dark:bg-slate-800/50 border-white/30 p-2 rounded-2xl text-[10px] cursor-pointer"></select>
                            <select id="ano_cal" class="w-full bg-white/50 dark:bg-slate-800/50 border-white/30 p-2 rounded-2xl text-[10px] cursor-pointer"></select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <select id="responsavel" class="w-full bg-white/50 dark:bg-slate-800/50 border-white/30 p-3 rounded-2xl text-[10px]"></select>
                        <select id="cartao" class="w-full bg-white/50 dark:bg-slate-800/50 border-white/30 p-3 rounded-2xl text-[10px]"></select>
                    </div>

                    <select id="categoria" class="w-full bg-white/50 dark:bg-slate-800/50 border-white/30 p-3 rounded-2xl text-[10px]"></select>

                    <div class="bg-white/30 dark:bg-slate-800/30 p-4 rounded-2xl border border-dashed border-slate-300 dark:border-slate-700">
                        <label class="flex items-center gap-2 cursor-pointer mb-3">
                            <input type="checkbox" id="mensal" class="w-4 h-4 rounded text-indigo-600"/> 
                            <span class="text-[11px] font-bold uppercase opacity-70">Gasto Fixo</span>
                        </label>
                        <div class="grid grid-cols-2 gap-2">
                            <select id="parcelaAtual" class="w-full text-[10px] bg-white/50 dark:bg-slate-800/50 border-white/30 p-2 rounded-xl"></select>
                            <select id="parcelasTotal" class="w-full text-[10px] bg-white/50 dark:bg-slate-800/50 border-white/30 p-2 rounded-xl"></select>
                        </div>
                    </div>
                    <button onclick="adicionar()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 uppercase tracking-widest text-[10px]">Salvar</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="glass p-5 rounded-[2.5rem] shadow-lg">
                    <p class="text-[9px] uppercase font-bold text-slate-400 mb-1">Total Filtrado</p>
                    <h2 id="totalFiltrado" class="text-2xl font-mono font-bold text-indigo-600 dark:text-indigo-400 tracking-tight">R$ 0,00</h2>
                </div>
                <div class="glass p-5 rounded-[2.5rem] shadow-lg">
                    <p class="text-[9px] uppercase font-bold text-slate-400 mb-1">Acumulado Geral</p>
                    <h2 id="totalGeral" class="text-2xl font-mono font-bold text-slate-900 dark:text-white tracking-tight">R$ 0,00</h2>
                </div>
                <div class="hidden md:flex glass p-4 rounded-[2.5rem] items-center justify-center">
                    <div class="relative h-14 w-full"><canvas id="grafico"></canvas></div>
                </div>
            </div>

            <div class="glass p-3 rounded-2xl shadow-md grid grid-cols-2 md:grid-cols-5 gap-2">
                <input id="filtroNome" placeholder="🔍 Buscar..." class="col-span-2 md:col-span-1 text-[11px] bg-white/40 dark:bg-slate-800/40 border-white/20 border px-3 py-2 rounded-xl" oninput="render()" />
                <div class="flex gap-1">
                    <select id="filtroMes_cal" class="text-[10px] bg-white/40 dark:bg-slate-800/40 border-white/20 border p-1 rounded-xl w-full" onchange="render()"></select>
                    <select id="filtroAno_cal" class="text-[10px] bg-white/40 dark:bg-slate-800/40 border-white/20 border p-1 rounded-xl w-full" onchange="render()"></select>
                </div>
                <select id="filtroCartao" class="text-[10px] bg-white/40 border-white/20 border p-2 rounded-xl" onchange="render()"></select>
                <select id="filtroCategoria" class="text-[10px] bg-white/40 border-white/20 border p-2 rounded-xl" onchange="render()"></select>
                <select id="filtroResponsavel" class="text-[10px] bg-white/40 border-white/20 border p-2 rounded-xl" onchange="render()"></select>
            </div>

            <div class="glass rounded-[2rem] shadow-xl overflow-hidden">
                <div class="overflow-x-auto custom-scroll">
                    <table class="w-full text-left">
                        <thead class="bg-white/20 dark:bg-slate-800/50 text-[9px] font-bold text-slate-400 uppercase tracking-widest border-b border-white/10">
                            <tr>
                                <th class="p-5">Mês</th>
                                <th class="p-5">Tags</th>
                                <th class="p-5">Descrição</th>
                                <th class="p-5 text-right">Valor</th>
                                <th class="p-5 text-center"></th>
                            </tr>
                        </thead>
                        <tbody id="tabela" class="divide-y divide-white/10 dark:divide-slate-800/50 text-xs"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let dados = JSON.parse(localStorage.getItem('dados')) || [];
let chart;

const responsaveis = ['Amor', 'Wandernilson', 'Gabriel', 'Isabelle', 'Jean', 'Jeiciane', 'Luiz', 'Lukas', 'Mãe', 'Matteus G', 'Pai', 'Thaynara', 'Wilber', 'Ynaiara'];
const cartoes = ['Nubank','PicPay','Next','Inter','C6','Mercado Pago'];
const categorias = ['Alimentação','Assinatura','Compras','Consulta','Dentista','Eletrônico','Empréstimo','Exame','Faculdade/Pós','Farmácia','Imposto','Internet','Internet Móvel','Investimentos','Manutenção','Pagamento','Parcela Casa','Pets','Pix mensal','Plano de saúde','Plano odontológico','Reserva de emergência','Roupas','Salão/Barbearia','Saúde pessoal','Supermercado','Transporte','Transporte público'];
const nomesMeses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
const anosDisponiveis = [2025, 2026, 2027, 2028, 2029, 2030];

function setupCalendario(idMes, idAno, labelMes, labelAno) {
    const selMes = document.getElementById(idMes);
    const selAno = document.getElementById(idAno);
    selMes.innerHTML = `<option value="" selected>${labelMes}</option>`;
    nomesMeses.forEach((m, idx) => { selMes.innerHTML += `<option value="${(idx+1).toString().padStart(2,'0')}">${m}</option>`; });
    selAno.innerHTML = `<option value="" selected>${labelAno}</option>`;
    anosDisponiveis.forEach(a => { selAno.innerHTML += `<option value="${a}">${a}</option>`; });
}

function preencher(id, lista, label){
    const el = document.getElementById(id);
    el.innerHTML = `<option value="">${label}</option>`;
    lista.forEach(i => el.innerHTML += `<option value="${i}">${i}</option>`);
}

preencher('responsavel', responsaveis, 'Responsável');
preencher('cartao', cartoes, 'Cartão');
preencher('categoria', categorias, 'Categoria');
preencher('filtroCartao', cartoes, 'Cartão');
preencher('filtroCategoria', categorias, 'Categoria');
preencher('filtroResponsavel', responsaveis, 'Responsável');

setupCalendario('mes_cal', 'ano_cal', 'Mês', 'Ano');
setupCalendario('filtroMes_cal', 'filtroAno_cal', 'Mês', 'Ano');

for(let i=1;i<=12;i++){
    parcelaAtual.innerHTML += `<option value="${i}">${i}ª</option>`;
    parcelasTotal.innerHTML += `<option value="${i}">${i}x</option>`;
}

const inputValor = document.getElementById('valor');
inputValor.oninput = e => {
    let value = e.target.value.replace(/\D/g, '');
    if (value === '') { e.target.value = ''; return; }
    let floatValue = parseFloat(value) / 100;
    e.target.value = floatValue.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function parseValor(v){
    return parseFloat(v.replace(/[R$\s.]/g, '').replace(',', '.')) || 0;
}

function adicionar(){
    const vMes = document.getElementById('mes_cal').value;
    const vAno = document.getElementById('ano_cal').value;
    if(!descricao.value || !inputValor.value || !vMes || !vAno) return alert('Campos obrigatórios vazios!');
    
    const valorNum = parseValor(inputValor.value);
    const respons = responsavel.value || 'N/A';
    const cart = cartao.value || 'N/A';
    const cat = categoria.value || 'Geral';
    const desc = descricao.value;

    if(mensal.checked){
        dados.push({ responsavel: respons, mes: `${vAno}-${vMes}`, cartao: cart, categoria: cat, descricao: desc, parcela: 'Fixo', valor: valorNum, id: Date.now() });
    } else {
        const pAtual = parseInt(parcelaAtual.value) || 1;
        const pTotal = parseInt(parcelasTotal.value) || 1;
        let startMonth = parseInt(vMes);
        let startYear = parseInt(vAno);
        
        for(let i = pAtual; i <= pTotal; i++) {
            let dataRef = new Date(startYear, (startMonth - 1) + (i - pAtual), 1);
            let mesFormat = `${dataRef.getFullYear()}-${(dataRef.getMonth()+1).toString().padStart(2,'0')}`;
            dados.push({ 
                responsavel: respons, 
                mes: mesFormat, 
                cartao: cart, 
                categoria: cat, 
                descricao: pTotal > 1 ? `${desc} (${i}/${pTotal})` : desc, 
                parcela: pTotal > 1 ? `${i}/${pTotal}` : 'À vista', 
                valor: valorNum, 
                id: Date.now() + i 
            });
        }
    }
    localStorage.setItem('dados', JSON.stringify(dados));
    descricao.value = ''; inputValor.value = ''; render();
}

function render(){
    const fMes = document.getElementById('filtroMes_cal').value;
    const fAno = document.getElementById('filtroAno_cal').value;
    const lista = dados.filter(d => {
        let matchData = true;
        if(fAno && fMes) matchData = (d.mes === `${fAno}-${fMes}`);
        else if(fAno) matchData = d.mes.startsWith(fAno);
        else if(fMes) matchData = d.mes.endsWith(fMes);
        return (!filtroNome.value || d.descricao.toLowerCase().includes(filtroNome.value.toLowerCase())) && matchData &&
        (!filtroCartao.value || d.cartao === filtroCartao.value) && (!filtroCategoria.value || d.categoria === filtroCategoria.value) && (!filtroResponsavel.value || d.responsavel === filtroResponsavel.value);
    });

    tabela.innerHTML='';
    let totalF=0, totalG=0;
    dados.forEach(d=> totalG+=d.valor);

    lista.sort((a,b) => a.mes.localeCompare(b.mes)).forEach((d)=>{
        totalF+=d.valor;
        const [ano, mes] = d.mes.split('-');
        tabela.innerHTML+=`
        <tr class="hover:bg-white/20 transition-colors">
            <td class="p-5 text-[9px] font-bold text-slate-400">${nomesMeses[parseInt(mes)-1]} ${ano}</td>
            <td class="p-5">
                <div class="flex flex-wrap gap-1">
                    <span class="px-2 py-0.5 rounded-md text-[8px] font-bold bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 border border-indigo-500/10">${d.categoria}</span>
                    <span class="px-2 py-0.5 rounded-md text-[8px] font-bold bg-slate-500/10 text-slate-500 border border-slate-500/10">${d.cartao}</span>
                </div>
            </td>
            <td class="p-5">
                <div class="font-bold text-slate-800 dark:text-slate-200">${d.descricao}</div>
                <div class="text-[8px] opacity-50 uppercase">${d.responsavel} • ${d.parcela}</div>
            </td>
            <td class="p-5 text-right font-mono font-bold text-indigo-600 dark:text-indigo-400">R$ ${d.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
            <td class="p-5 text-center">
                <button onclick="remover(${d.id})" class="text-slate-300 hover:text-red-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </button>
            </td>
        </tr>`;
    });
    totalFiltrado.innerText='R$ '+totalF.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    totalGeral.innerText='R$ '+totalG.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    renderChart(lista);
}

function renderChart(lista){
    let cat={};
    lista.forEach(d=> cat[d.categoria]=(cat[d.categoria]||0)+d.valor);
    if(chart) chart.destroy();
    chart=new Chart(grafico,{
        type:'doughnut',
        data:{
            labels:Object.keys(cat),
            datasets:[{ data:Object.values(cat), backgroundColor:['#6366f1','#10b981','#f59e0b','#ec4899','#06b6d4','#8b5cf6','#ef4444'], borderWidth:0 }]
        },
        options: { plugins: { legend: { display: false } }, cutout: '80%', maintainAspectRatio: false }
    });
}

function toggleDarkMode() {
    document.documentElement.classList.toggle('dark');
    localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
    render();
}
if(localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');

function exportarExcel() {
    const ws = XLSX.utils.json_to_sheet(dados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Finanças");
    XLSX.writeFile(wb, "Financas_Glass.xlsx");
}

function remover(id){ if(confirm('Excluir este item?')){ dados = dados.filter(d => d.id !== id); localStorage.setItem('dados', JSON.stringify(dados)); render(); } }
function resetar(){ if(confirm('Tudo será apagado. Continuar?')){ localStorage.removeItem('dados'); dados=[]; render(); } }
render();
</script>
</body>
</html>
